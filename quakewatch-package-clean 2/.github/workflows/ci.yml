# .github/workflows/ci.yml
# Runs tests on every push to make sure nothing is broken.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the package and dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
